name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        channel: ['1.11', '1.12', 'beta']
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/install-juliaup@v3
        with:
          channel: ${{ matrix.channel }}
      - uses: julia-actions/cache@v2
      - run: julia --project=@. -e 'using Pkg; Pkg.test()'
